version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      next:
        patterns:
          - next
          - "@next/*"
          - eslint-config-next
      react:
        patterns:
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"
      types:
        patterns:
          - "@types/*"
        exclude-patterns:
          - "@types/react"
          - "@types/react-dom"
      eslint:
        patterns:
          - eslint
          - "@eslint/*"
        exclude-patterns:
          - eslint-config-next

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
